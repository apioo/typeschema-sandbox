
<div class="container-fluid p-3">
  <div class="row">
    <div class="col-md-6">
      <typeschema-editor [specification]="spec" [operationEnabled]="false" (change)="change($event)"></typeschema-editor>
    </div>
    <div class="col-md-6">
      @if (preview) {
        <pre><code [highlight]="preview" language="json"></code></pre>
      }
    </div>
  </div>
</div>
